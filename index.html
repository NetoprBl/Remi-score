<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remi Score</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI;background:#f2f2f7;margin:0;padding:20px;text-align:center;transition:0.3s;}
.dark{background:#1c1c1e;color:white;}
.page{display:none;}
.active{display:block;}
.title{font-size:22px;color:#007AFF;margin-bottom:20px;}
.btn{padding:12px 18px;border-radius:14px;border:1px solid #007AFF;background:white;color:#007AFF;font-size:16px;margin:4px;}
.dark .btn{background:#2c2c2e;color:white;border:1px solid #555;}
.players{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
input{padding:10px;font-size:18px;border-radius:8px;border:1px solid #ccc;width:70px;text-align:center;}
#gameBoard{display:grid;grid-template-columns:1fr 1.5fr 1fr 1fr;gap:12px;align-items:center;justify-items:center;margin-top:25px;}
.dealer{font-size:16px;color:#007AFF;}
.playerName{font-size:20px;font-weight:600;color:#007AFF;}
.totalScore{font-size:24px;font-weight:bold;}
.scoreInput{font-size:20px;width:60px;}
table{width:100%;border-collapse:collapse;margin-top:10px;color:#007AFF;}
th,td{border:1px solid #ccc;padding:8px;}
th.timeCol{color:#007AFF;}
td.timeCol{color:red;width:80px;text-align:center;border:1px solid #ccc;}
.cycleLine td:not(.timeCol){border-bottom:3px solid #007AFF !important;}
.dark table{color:#4da3ff;}
.archiveItem{border:1px solid #ccc;padding:10px;margin:10px;border-radius:10px;text-align:left;}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="title">Odaberi koliko igraca je u igri:</div>
  <button class="btn" onclick="selectPlayers(2)">2</button>
  <button class="btn" onclick="selectPlayers(3)">3</button>
  <button class="btn" onclick="selectPlayers(4)">4</button>
  <button class="btn" onclick="selectPlayers(5)">5</button>
  <button class="btn" onclick="selectPlayers(6)">6</button>
  <br><br>
  <button class="btn" onclick="openArchiveFromMenu()">Arhiva</button>
  <button class="btn" onclick="toggleDark()">Dark mode</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="title">Upisi imena igraca</div>
  <div id="playersContainer" class="players"></div>
  <button class="btn" onclick="showPage(1)">Nazad</button>
  <button class="btn" onclick="startGame()">Kreni</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <button class="btn" onclick="newGame()">Nova igra</button>
  <button class="btn" onclick="openTable()">Tabela</button>
  <button class="btn" onclick="openArchive()">Arhiva</button>
  <button class="btn" onclick="openStats()">Statistika</button>
  <button class="btn" onclick="removePlayer()">Izbaci igraca</button>
  <button class="btn" onclick="toggleDark()">Dark mode</button>
  <div id="gameBoard"></div>
  <br>
  <button class="btn" onclick="addScore()">Upisi rundu</button>
  <button class="btn" onclick="removeLast()">Ispravka</button>
</div>

<!-- PAGE 4 TABELA -->
<div id="page4" class="page">
  <h3>Tabela rundi</h3>
  <table id="roundTable"></table>
  <br>
  <button class="btn" onclick="showPage(3)">Nazad</button>
</div>

<!-- PAGE 5 ARHIVA -->
<div id="page5" class="page">
  <h3>Arhiva</h3>
  <button class="btn" onclick="openStats()">Statistika</button>
  <div id="archiveList"></div>
  <button class="btn" onclick="deleteSelected()">Obrisi oznacene</button>
  <button class="btn" onclick="closeArchive()">Nazad</button>
</div>

<!-- PAGE 6 STATISTIKA -->
<div id="page6" class="page">
  <h3>Statistika</h3>
  <div id="statsList"></div>
  <button class="btn" onclick="showPage(previousPage)">Nazad</button>
</div>

<script>
let playerNames=[], totals=[], roundHistory=[], roundCount=0, previousPage=1;
let roundStartTime=null, gameStartTime=null;

function toggleDark(){
  document.body.classList.toggle("dark");
}

function showPage(n){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page" + n).classList.add("active");
}

// Funkcija za prikaz tabele sa dodatom plavom linijom na kraju svakog ciklusa
function openTable() {
  showPage(4);
  let table = document.getElementById("roundTable");
  table.innerHTML = "";
  
  // Dodavanje zaglavlja tabele
  let header = "<tr>";
  playerNames.forEach((p) => (header += "<th>" + p + "</th>"));
  header += "<th class='timeCol'>Vrijeme</th></tr>";
  table.innerHTML += header;

  // Praćenje suma i dodavanje redova sa poenima
  let sums = new Array(playerNames.length).fill(0);
  roundHistory.forEach((r, i) => {
    r.slice(0, playerNames.length).forEach((v, j) => {
      sums[j] += v;
    });
    let roundTime = r[r.length - 1];
    let row = "<tr>";
    sums.forEach((v) => (row += "<td>" + v + "</td>"));
    row += "<td class='timeCol'>" + formatTime(roundTime) + "</td></tr>";
    
    // Dodavanje ciklusne linije na kraju svakog ciklusa
    if ((i + 1) % playerNames.length == 0) { 
      row = `<tr class='cycleLine'>` + row.replace(/<td class='timeCol'>.*<\/td>/, "<td class='timeCol'>" + formatTime(roundTime) + "</td>") + "</tr>";
    }
    table.innerHTML += row;
  });
}

// Ostale funkcije
function selectPlayers(num){
  showPage(2);
  let c = document.getElementById("playersContainer");
  c.innerHTML = "";
  for (let i = 1; i <= num; i++){
    c.innerHTML += `<label>Igrac ${i}</label><input id="player${i}">`;
  }
}

function startGame(){
  playerNames = [];
  totals = [];
  roundHistory = [];
  roundCount = 0;
  let inputs = document.querySelectorAll("#playersContainer input");
  inputs.forEach((p, i) => {
    let name = p.value || "Igrac " + (i + 1);
    playerNames.push(name);
    totals.push(0);
  });
  gameStartTime = new Date().getTime();
  roundStartTime = new Date().getTime();
  createBoard();
  saveCurrentGame();
  showPage(3);
}

function createBoard(){
  let board = document.getElementById("gameBoard");
  board.innerHTML = "";
  let dealer = currentDealer();
  playerNames.forEach((name, i) => {
    let label = (i == dealer) ? "Dijeli:" : "";
    board.innerHTML += `<div class="dealer">${label}</div>
      <div class="playerName">${name}</div>
      <input type="number" class="scoreInput" id="score${i}">
      <div class="totalScore" id="total${i}">${totals[i]}</div>`;
  });
}

function currentDealer(){
  return roundCount % playerNames.length;
}

function formatTime(seconds){
  let h = Math.floor(seconds / 3600); 
  let m = Math.floor((seconds % 3600) / 60);
  return (h < 10 ? "0" + h : h) + ":" + (m < 10 ? "0" + m : m);
}
</script>

</body>
</html>
