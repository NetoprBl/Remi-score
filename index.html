<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remi Score</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI;background:#f2f2f7;margin:0;padding:0px;text-align:center;position: relative;
  height: 100vh;transition:0.3s;}
.dark{background:#1c1c1e;color:white;}
.page {
  display: none;       /* sve stranice po defaultu sakrivene */
  position: absolute;  /* da se preklapaju */
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.page.active {
  display: flex;           /* aktivna stranica je flex */
  flex-direction: column;
  align-items: center;
}
.title{font-size:22px;color:#007AFF;margin-bottom:20px;}
.btn{padding:12px 18px;border-radius:14px;border:1px solid #007AFF;background:white;color:#007AFF;font-size:16px;margin:4px;}
.dark .btn{background:#2c2c2e;color:white;border:1px solid #555;}
.players{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:20px;

  align-items:center;   /* ⭐ VERTIKALNO CENTRIRANJE */
}
.players label{
  font-size:18px;     /* veći tekst */
  font-weight:600;    /* polu-bold */
  color:#007AFF;      /* plava kao ostatak appa */
}
input{padding:10px;font-size:18px;border-radius:8px;border:1px solid #ccc;width:70px;text-align:center;}
select{
  font-size:22px;     /* ili 20px ako želiš još veće */
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:140px;
  text-align:center;
}
#gameBoard{display:grid;grid-template-columns:1fr 1.5fr 1fr 1fr;gap:12px;align-items:center;justify-items:center;margin-top:25px;}
.dealer{font-size:16px;color:#007AFF;}
.playerName{font-size:20px;font-weight:600;color:#007AFF;}
.totalScore{font-size:24px;font-weight:bold;}
.scoreInput{font-size:20px;width:60px;}
table{width:100%;border-collapse:collapse;margin-top:10px;color:#007AFF;}
th,td{border:1px solid #ccc;padding:8px;}
th.timeCol{color:#007AFF;}
td.timeCol{color:red;width:80px;text-align:center;border:1px solid #ccc;}
.cycleLine td:not(.timeCol){border-bottom:3px solid #007AFF !important;}
.dark table{color:#4da3ff;}
.archiveItem {
  border: 1px solid #ccc;
  padding: 10px;
  margin: 10px 0;          /* samo vertikalni margin */
  border-radius: 10px;
  text-align: left;
  width: 100%;              /* zauzima cijelu širinu roditelja */
  box-sizing: border-box;   /* padding i border uključen u širinu */
  background-color: #e9f2ff; /* svijetlo plava boja */
  cursor: pointer;           /* za dropdown efekte */
}

#archiveList {
  max-height: 60vh;         /* visina 60% ekrana */
  overflow-y: auto;         /* vertikalni scroll */
  overflow-x: hidden;       /* sakriva horizontalni scroll */
  padding-right: 6px;
  width: 100%;              /* isto zauzima cijelu širinu roditelja */
  box-sizing: border-box;
}

/* Sadržaj unutar dropdowna */
.archiveItem + div {
  max-height: 400px;       /* maksimalna visina dropdowna */
  overflow-y: auto;        /* scroll ako je sadržaj veći */
  width: 100%;             /* fiksna širina */
  box-sizing: border-box;
  background-color: #f0f8ff; /* svjetlija plava za kontrast */
  padding: 5px 10px;
  border-radius: 0 0 10px 10px; /* zaokruži samo donji dio */
}
/* STATISTIKA - NASLOVI */
#page6 h3 {
  font-weight: bold;
  color: #007AFF;     /* plava boja */
  font-size: 26px;    /* 4px veće od trenutnih 22px */
  margin-bottom: 10px;
}

/* STATISTIKA - PODNASLOVI */
#statsList b, #handStatsList b {
  font-weight: bold;
  color: #007AFF;     /* plava boja */
  font-size: 20px;    /* 2px veće od trenutnih 18px */
  text-align: left;
}

/* Podnaslovi hand statistike */
#handStatsList .handSubTitle {
  font-weight: bold;
  color: #007AFF;   /* plava boja */
  font-size: 18px;  /* 2px veće nego prije */
  margin-top: 10px;
}

/* PODACI ostaju crni i veličine kao sad */
#statsList div, #handStatsList div, #statsList span, #handStatsList span {
  color: black;
  font-size: 16px;    /* ili ostavi kao trenutno */
  margin-left: 10px;  /* malo uvlačenje radi preglednosti */
}

/* Page1 centriranje */
#page1 {
  flex-direction: column;
  justify-content: center; /* vertikalno centriranje */
  align-items: center;     /* horizontalno centriranje */
  height: 100vh;           /* zauzima cijeli ekran */
  text-align: center;
  gap: 20px;               /* razmak između redova */
}

/* Naslov */
#page1 .title {
  font-size: 22px;
  color: #007AFF;
  margin-bottom: 10px;
}

/* Red dugmadi za igrace */
#page1 .playerButtons {
  display: flex;
  justify-content: center;
  gap: 8px;   /* razmak između dugmadi */
}

/* Red dugmadi za meni */
#page1 .menuButtons {
  display: flex;
  justify-content: center;
  gap: 12px;
}

/* Standardni stil dugmadi */
#page1 .btn {
  padding: 12px 18px;
  border-radius: 14px;
  border: 1px solid #007AFF;
  background: white;
  color: #007AFF;
  font-size: 16px;
  cursor: pointer;
}
#page1 .dark .btn {
  background: #2c2c2e;
  color: white;
  border: 1px solid #555;
}

/* PAGE 3 */
#page3 {
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;

  height: 100vh;

  padding: 20px;
  gap: 20px;

  box-sizing: border-box;   /* ⭐ KLJUČNO */
}

/* Gornja dugmad - 2 reda x 2 kolone */
#page3 .upperButtons {
  display: grid;
  grid-template-columns: repeat(2, auto); /* 2 kolone, širina po sadržaju */
  grid-auto-rows: auto;                    /* visina po sadržaju */
  gap: 10px 12px;                          /* vertikalni i horizontalni razmak */
  justify-content: center;                  /* centrirano po horizontali */
  margin-left: 40px;
}

/* Stil za ruku (hand) */
#page3 .hand {
  width: 98%;            /* zauzima cijelu širinu */
  display: flex;
  justify-content: flex-end;  /* desno poravnanje */
  align-items: center;
  margin-bottom: 0px;
}

/* Donja dugmad - jedan red centriran */
#page3 .downButtons {
  display: flex;
  justify-content: center;
  gap: 12px;              /* razmak između dugmadi */
  margin-left: 40px;
}

/* Standardni stil dugmadi kao na drugim stranicama */
#page3 .btn {
  padding: 12px 18px;
  border-radius: 14px;
  border: 1px solid #007AFF;
  background: white;
  color: #007AFF;
  font-size: 16px;
  cursor: pointer;
}

.dark #page3 .btn {
  background: #2c2c2e;
  color: white;
  border: 1px solid #555;
}

#page5 {
  width: 100%;
  box-sizing: border-box;

}

#page5 .upperButtons {
  flex: 0 0 auto; /* ne raste */
  display: grid;
  grid-template-columns: repeat(2, auto);
  gap: 10px 12px;
  justify-content: center;
  margin-bottom: 10px;
}

#page5 .contentWrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  width: 100%;           /* 🔥 KLJUČNO */
}

#archiveList {
  flex: 1;
  overflow-y: auto;
  width: 100%;           /* 🔥 NAJVAŽNIJE */
  box-sizing: border-box;
  scrollbar-gutter: stable;
}

.archiveItem {
  width: 100%;
  
  box-sizing: border-box;
  }

#page5 .backButton {
  width: 100%;
  margin-top: 1px;
}

/* PAGE 6 layout */
#page6 {
  width: 100%;
  box-sizing: border-box;
  justify-content: flex-start; 
  padding: 15px;
  gap: 12px;
  /* overflow: visible; */
  
}
.statsButtons {
  display: grid;
  grid-template-columns: repeat(2, auto);
  gap: 10px 12px;
  justify-content: center;   /* ⭐ horizontalno centrirano */
  margin-bottom: 10px;
}

/* Accordion container */
.accordion {
  width: 100%;
}

/* Header (naziv liste) */
.accordionHeader {
  width: 100%;
  background: #d6ebff;     /* svijetlo plava */
  color: #007AFF;
  font-weight: bold;
  padding: 14px;
  border-radius: 12px;
  text-align: left;
  font-size: 18px;
  cursor: pointer;
  box-sizing: border-box;
}

/* Title (naziv) */
.title {
  color: #007AFF;
  font-weight: bold;
  padding: 14px;
  text-align: center;
  font-size: 36px;
}

/* Sadržaj liste */
.accordionContent {
  width: 100%;
  max-height: 50vh;        /* tako obje stanu na ekran */
  overflow-y: auto;        /* scroll unutar liste */
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-top: 5px;
  display: none;           /* zatvoreno po defaultu */
  box-sizing: border-box;
}

/* Dark mode */
.dark .accordionContent {
  background: #2c2c2e;
}

/* Game board grid (ako želiš da bude isto kao prije) */
#page3 #gameBoard {
  display: grid;
  grid-template-columns: 20px 80px 40px 40px 70px 70px;
  gap: 6px;
  align-items: center;
  justify-items: left;
  width: 100%;
  box-sizing: border-box;
}

#gameBoard b {
  color: #007AFF;
  font-size: 14px;
}

#gameBoard input[type="checkbox"] {
  margin: 0;
}

.checkCell {
  display: flex;
  justify-content: center;
  align-items: center;
}

.dealerDot {
  width: 12px;
  height: 12px;
  background: #007AFF;
  border-radius: 50%;
  display: inline-block;
}

#page3 #gameBoard .totalScore {
  justify-self: right; /* horizontalno centriranje u toj koloni */
}

</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="title">Odaberi koliko igraca je u igri:</div>

  <!-- Red dugmadi za broj igraca -->
  <div class="playerButtons">
    <button class="btn" onclick="selectPlayers(2)">2</button>
    <button class="btn" onclick="selectPlayers(3)">3</button>
    <button class="btn" onclick="selectPlayers(4)">4</button>
    <button class="btn" onclick="selectPlayers(5)">5</button>
    <button class="btn" onclick="selectPlayers(6)">6</button>
  </div>

  <!-- Red dugmadi za Arhivu i Dark mode -->
  <div class="menuButtons">
    <button class="btn" onclick="openArchiveFromMenu()">Arhiva</button>
    <button class="btn" onclick="toggleDark()">Dark mode</button>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="title">Upisi imena igraca</div>
  <div id="playersContainer" class="players"></div>
  <button class="btn" onclick="addNewPlayer()">Dodaj novog igraca</button>
  <button class="btn" onclick="showPage(1)">Nazad</button>
  <button class="btn" onclick="startGame()">Kreni</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <!-- Red dugmadi za broj igraca -->
  <div class="upperButtons">
  <button class="btn" onclick="newGame()">Nova igra</button>
  <button class="btn" onclick="openTable()">Tabela</button>
  <button class="btn" onclick="openArchive()">Arhiva</button>
  <button class="btn" onclick="openStats()">Statistika</button>
  <button class="btn" onclick="removePlayer()">Izbaci igraca</button>
  <button class="btn" onclick="toggleDark()">Dark mode</button>
  </div>
  <!-- Ruka -->
  <div class="hand">
    <div id="handLabel" style="text-align:right; font-size:18px; color:#007AFF; margin-top:5px; margin-bottom:5px;">
    Ruka: 1
    </div>
  </div>
  <div id="gameBoard"></div>
  <br>
  <div class="downButtons">
    <button class="btn" onclick="addScore()">Upisi rundu</button>
     <button class="btn" onclick="removeLast()">Ispravka</button>
  </div>
</div>

<!-- PAGE 4 TABELA -->
<div id="page4" class="page">
  <h3>Tabela rundi</h3>
  <table id="roundTable"></table>
  <br>
  <button class="btn" onclick="showPage(3)">Nazad</button>
</div>

<!-- PAGE 5 ARHIVA -->
<div id="page5" class="page">
  <h3>Arhiva</h3>

  <div class="upperButtons">
    <button class="btn" onclick="importArchive()">Vrati arhivu</button>
    <button class="btn" onclick="exportArchive()">Backup arhive</button>
    <button class="btn" onclick="openStats()">Statistika</button>
    <button class="btn" onclick="deleteSelected()">Obrisi oznacene</button>
  <input type="file" id="importFile" accept=".json" style="display:none">
  </div>

  <div class="contentWrapper">
    <div id="archiveList"></div>
    <button class="btn backButton" onclick="closeArchive()">Nazad</button>
  </div>
</div>

<!-- PAGE 6 STATISTIKA -->
<div id="page6" class="page">
 <div class="accordion">
    <div class="title">
      Statistika
    </div>
    <div class="statsButtons">
  <button class="btn" onclick="exportFullStats()">Backup statistike</button>
  <button class="btn" onclick="importFullStats()">Vrati statistiku</button>
</div>

<!-- skriveni input za izbor fajla -->
<input type="file" id="importStatsFile" accept=".json" style="display:none">
 </div>
  <!-- LISTA 1 -->
  <div class="accordion">
    <div class="accordionHeader" onclick="toggleAcc(1)">
      ▾ Pobjede i poeni
    </div>
    <div id="acc1" class="accordionContent">
      <div id="statsList"></div>
    </div>
  </div>

  <!-- LISTA 2 -->
  <div class="accordion">
    <div class="accordionHeader" onclick="toggleAcc(2)">
      ▾ Hand statistika
    </div>
    <div id="acc2" class="accordionContent">
      <div id="handStatsList"></div>
    </div>
  </div>

  <button class="btn" onclick="showPage(previousPage)">
    Nazad
  </button>

</div>

<script>
let playersDB = JSON.parse(localStorage.getItem("remiPlayersDB")) || [];
let playerNames=[], totals=[], roundHistory=[], roundCount=0, previousPage=1;
let archivePreviousPage = 1;   // ⭐ NOVO
let roundStartTime=null, gameStartTime=null;
let handStats = JSON.parse(localStorage.getItem("remiHandStats")) || {
  "-400": {},  // Mali hand
  "-200": {},  // Donja karta / joker
  "-100": {},  // Kupljena karta
  "-80": {},
  "-40": {}    // Standardno zatvaranje
};
function toggleDark(){document.body.classList.toggle("dark");}
function showPage(n){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById("page"+n).classList.add("active");}

// Nastavi prethodnu igru
window.onload = function(){
  const saved = localStorage.getItem("remiCurrentGame");
  if(saved){
    if(confirm("Postoji nedovrsena igra. Zelite li da nastavite?")){
      const state = JSON.parse(saved);
      playerNames = state.playerNames;
      totals = state.totals;
      roundHistory = state.roundHistory;
      roundCount = state.roundCount;
      gameStartTime = new Date().getTime() - state.elapsedTime;
      createBoard();
      showPage(3);
    } else { localStorage.removeItem("remiCurrentGame"); }
  }
};

function saveCurrentGame() {
  const elapsedTime = gameStartTime ? new Date().getTime() - gameStartTime : 0;
  const gameState = {playerNames, totals, roundHistory, roundCount, elapsedTime};
  localStorage.setItem("remiCurrentGame", JSON.stringify(gameState));
}
function updateHandStats(round) {
  // round = niz poena za sve igrace u toj rundi
  round.forEach((score, i) => {
    let player = playerNames[i];
    if(score === -400) incrementHand(player, "-400");
    else if(score === -200) incrementHand(player, "-200");
    else if(score === -100) incrementHand(player, "-100");
    else if(score === -80) incrementHand(player, "-80");
    else if(score === -40) incrementHand(player, "-40");
  });

  // Sačuvaj u LocalStorage
  localStorage.setItem("remiHandStats", JSON.stringify(handStats));
}

function incrementHand(player, type) {
  if(!handStats[type][player]) handStats[type][player] = 0;
  handStats[type][player]++;
}

function toggleAcc(n) {
  const el = document.getElementById("acc" + n);
  el.style.display = (el.style.display === "block") ? "none" : "block";
}

function displayHandStats() {
  const container = document.getElementById("handStatsList");
  container.innerHTML = ""; // očisti prethodni prikaz

  const handNames = {
    "-400": "Mali hand ili<br>hand sa donjom kartom i jokerom",
    "-200": "Hand sa donjom kartom ili jokerom",
    "-100": "Hand sa kupljenom kartom",
    "-80": "Standarno zatvaranje sa jokerom",
    "-40": "Standardno zatvaranje"
  };

  Object.keys(handNames).forEach(type => {
    const players = handStats[type];
    const playerEntries = Object.entries(players)
      .filter(([_, count]) => count > 0); // samo oni koji imaju >0

    if(playerEntries.length === 0) return; // preskoči ako nema

    
    
    // Naslov handa
const title = document.createElement("div");
title.className = "handSubTitle";  // dodaj klasu
title.innerHTML = handNames[type];
container.appendChild(title);

    // Igrači sa brojem handova
    playerEntries.forEach(([name, count]) => {
      const div = document.createElement("div");
      div.textContent = `${name} — ${count}`;
      container.appendChild(div);
    });
  });
}
function addNewPlayer(){

  let name = prompt("Unesite ime igraca:");

  if(!name) return;

  name = name.trim();

  if(name === ""){
    alert("Neispravno ime.");
    return;
  }

  // sprječava duplikate (case-insensitive)
  let exists = playersDB.some(p => p.toLowerCase() === name.toLowerCase());

  if(exists){
    alert("Igrac vec postoji.");
    return;
  }

  playersDB.push(name);
  localStorage.setItem("remiPlayersDB", JSON.stringify(playersDB));

  alert("Igrac dodat.");

  // osvježi dropdownove
  selectPlayers(document.querySelectorAll("#playersContainer select").length);

}

function selectPlayers(num){

  showPage(2);

  let c=document.getElementById("playersContainer");
  c.innerHTML="";

  for(let i=1;i<=num;i++){

    let options = playersDB.map(p=>`<option value="${p}">${p}</option>`).join("");

    c.innerHTML += `
      <label>Igrac ${i}</label>
      <select id="player${i}">
        <option value="">-- izaberi igraca --</option>
        ${options}
      </select>
    `;
  }

}

function showArchivedTable(index){
  let archive = JSON.parse(localStorage.getItem("remiArchive")) || [];
  if(!archive[index] || !archive[index].tableHTML) return;

  showPage(4);
  let table = document.getElementById("roundTable");
  table.innerHTML = archive[index].tableHTML;
}

function startGame(){

  playerNames=[], totals=[], roundHistory=[], roundCount=0;

  let selects=document.querySelectorAll("#playersContainer select");

  selects.forEach((s,i)=>{

    let name=s.value;

    if(!name){
      alert("Izaberite igraca za sve pozicije.");
      throw "Missing player";
    }

    playerNames.push(name);
    totals.push(0);

  });

  gameStartTime=new Date().getTime();
  roundStartTime=new Date().getTime();

  createBoard();
  // RESET labela ruka
  document.getElementById("handLabel").innerText = "Ruka: 1";
  saveCurrentGame();
  showPage(3);

}

function currentDealer(){return roundCount%playerNames.length;}

function createBoard() {
  let board = document.getElementById("gameBoard");
  board.innerHTML = "";

  // HEADER
  board.innerHTML += `
    <div></div>
    <div><b></b></div>
    <div><b>P1</b></div>
    <div><b>PJ</b></div>
    <div><b></b></div>
    <div><b></b></div>
  `;

  let dealer = currentDealer();

  playerNames.forEach((name, i) => {
    let dealerIcon = (i == dealer) ? '<span class="dealerDot"></span>' : "";

    board.innerHTML += `
      <div>${dealerIcon}</div>
      <div class="playerName">${name}</div>

      <div class="checkCell">
        <input type="checkbox" class="p1Check" data-player="${i}">
      </div>
      <div class="checkCell">
        <input type="checkbox">
      </div>

      <input type="number" class="scoreInput" id="score${i}">
      <div class="totalScore" id="total${i}">${totals[i]}</div>
    `;
  });

  // Dodaj event listener za sve P1 checkboxeve
  document.querySelectorAll(".p1Check").forEach(cb => {
    cb.addEventListener("change", function() {
      const i = parseInt(this.dataset.player);
      if (this.checked) {
        totals[i] -= 100;
      } else {
        totals[i] += 100;
      }
      document.getElementById("total" + i).innerText = totals[i];
    });
  });
}

function formatTime(seconds){
  let h=Math.floor(seconds/3600); 
  let m=Math.floor((seconds%3600)/60);
  return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m);
}

function formatDate(dateStr){
  let d=new Date(dateStr);
  let y=("0"+d.getFullYear()).slice(-2);
  let m=("0"+(d.getMonth()+1)).slice(-2);
  let day=("0"+d.getDate()).slice(-2);
  return y+":"+m+":"+day;
}
function updateHandStats(round){

  round.forEach((score, i)=>{

    let player = playerNames[i];

    if(score === -400){
      if(!handStats["-400"][player]) handStats["-400"][player] = 0;
      handStats["-400"][player]++;
    }

    if(score === -200){
      if(!handStats["-200"][player]) handStats["-200"][player] = 0;
      handStats["-200"][player]++;
    }

    if(score === -100){
      if(!handStats["-100"][player]) handStats["-100"][player] = 0;
      handStats["-100"][player]++;
    }
    
    if(score === -80){
      if(!handStats["-80"][player]) handStats["-80"][player] = 0;
      handStats["-80"][player]++;
    }

    if(score === -40){
      if(!handStats["-40"][player]) handStats["-40"][player] = 0;
      handStats["-40"][player]++;
    }

  });

  localStorage.setItem("remiHandStats", JSON.stringify(handStats));
}
function addScore() {
  let round = [];
  let roundEndTime = new Date().getTime();
  let roundDuration = Math.round((roundEndTime - roundStartTime)/1000);
  roundStartTime = roundEndTime;

  playerNames.forEach((p, i) => {
    let val = document.getElementById("score" + i).value;
    if(val === "") val = 0;
    val = parseInt(val);

    // Ako je P1 čekiran, oduzmi dodatnih 100
    let p1Checkbox = document.querySelector(`.p1Check[data-player="${i}"]`);
    if(p1Checkbox && p1Checkbox.checked) {
      val -= 100; // P1 oduzima 100 poena
    }

    totals[i] += val;
    document.getElementById("total" + i).innerText = totals[i];

    round.push(val);

    // Reset input
    document.getElementById("score" + i).value = "";
    // Reset P1 checkbox
    if(p1Checkbox) p1Checkbox.checked = false;
  });

  round.push(roundDuration);
  roundHistory.push(round);
  roundCount++;

  updateHandStats(round);
  document.getElementById("handLabel").innerText = "Ruka: " + Math.floor(roundCount / playerNames.length + 1);

  createBoard(); // ponovo renderuj board
  saveCurrentGame();
}

function removeLast() {
  if(roundHistory.length == 0) return;

  let last = roundHistory.pop();

  last.slice(0, playerNames.length).forEach((v, i) => {
    totals[i] -= v; // vrati poene iz poslednje runde
  });

  roundCount--;
  createBoard();
  saveCurrentGame();
}

function newGame(){
  if(roundHistory.length>0){
    let save = confirm("Sacuvati trenutnu igru?");
    if(save){ saveGame(); localStorage.removeItem("remiCurrentGame"); resetGameState(); showPage(1); return; }
    let dont = confirm("Pokrenuti novu igru bez cuvanja?");
    if(dont){ localStorage.removeItem("remiCurrentGame"); resetGameState(); showPage(1); return; }
  } else { localStorage.removeItem("remiCurrentGame"); resetGameState(); showPage(1); }
}

function resetGameState(){
  playerNames=[]; totals=[]; roundHistory=[]; roundCount=0;
  roundStartTime=null; gameStartTime=null;
  document.getElementById("gameBoard").innerHTML="";
  document.querySelectorAll("#playersContainer input").forEach(i=>i.value="");
  // RESET labela ruka
  document.getElementById("handLabel").innerText = "Ruka: 1";
}

function saveGame(){
  let archive = JSON.parse(localStorage.getItem("remiArchive")) || [];
  let totalGameTime = Math.round((new Date().getTime() - gameStartTime)/1000);

  // Kreiraj HTML tabele rundi iz roundHistory
  let tableHTML = "";
  if(roundHistory.length > 0){
    // HEADER
    tableHTML = "<tr>";
    playerNames.forEach(p => tableHTML += "<th>" + p + "</th>");
    tableHTML += "<th class='timeCol'>Vrijeme</th></tr>";

    let sums = new Array(playerNames.length).fill(0);

    roundHistory.forEach((r, i) => {
      r.slice(0, playerNames.length).forEach((v, j) => { sums[j] += v; });
      let roundTime = r[r.length-1];
      let cycleClass = ((i+1) % playerNames.length === 0) ? "cycleLine" : "";
      tableHTML += "<tr class='" + cycleClass + "'>";
      sums.forEach(v => tableHTML += "<td>" + v + "</td>");
      tableHTML += "<td class='timeCol'>" + formatTime(roundTime) + "</td></tr>";
    });
  }

  archive.push({
    date: new Date().toLocaleString(),
    players: playerNames,
    scores: totals,
    duration: totalGameTime,
    tableHTML: tableHTML // sada uvijek sadrži tabelu
  });

  localStorage.setItem("remiArchive", JSON.stringify(archive));
}

function openTable(){

  showPage(4);

  let table=document.getElementById("roundTable");

  // HEADER
  let header="<tr>";
  playerNames.forEach(p=>header+="<th>"+p+"</th>");
  header+="<th class='timeCol'>Vrijeme</th></tr>";

    let cycleClass = ((i+1) % playerNames.length === 0) ? "cycleLine" : "";

function loadArchive() {
  let archive = JSON.parse(localStorage.getItem("remiArchive")) || [];
  let container = document.getElementById("archiveList");
  container.innerHTML = "";

  if (archive.length === 0) {
    container.innerHTML = "Nema sačuvanih partija.";
    return;
  }

  // Grupisanje po godina-mjesec
  let groups = {};
  archive.forEach((game, index) => {
    let d = new Date(game.date);
    let key = d.getFullYear() + "-" + d.getMonth();
    if(!groups[key]) groups[key] = { year: d.getFullYear(), month: d.getMonth(), games: [] };
    groups[key].games.push({ game, index });
  });

  let sortedKeys = Object.keys(groups).sort((a,b) => b.localeCompare(a));
  let now = new Date();

  sortedKeys.forEach(key => {
    let group = groups[key];
    const monthNames = ["Januar","Februar","Mart","April","Maj","Juni","Juli","Avgust","Septembar","Oktobar","Novembar","Decembar"];
    let isCurrent = (group.year === now.getFullYear() && group.month === now.getMonth());

    // NASLOV MJESECA
    let header = document.createElement("div");
    header.className = "archiveItem";
    header.style.fontWeight = "bold";
    header.style.cursor = "pointer";
    header.style.background = "#e9f2ff";
    header.innerText = monthNames[group.month] + " " + group.year;
    container.appendChild(header);

    // KONTEJNER PARTIJA
    let gamesDiv = document.createElement("div");
    gamesDiv.style.display = isCurrent ? "block" : "none";

    header.onclick = () => {
      gamesDiv.style.display = gamesDiv.style.display === "none" ? "block" : "none";
    };

    // PARTIJE
    group.games.forEach(({ game, index }) => {
      let div = document.createElement("div");
      div.className = "archiveItem";

      let html = `<input type="checkbox" value="${index}"> 
                  <b>${game.date}</b><br>`;
      game.players.forEach((p,i)=>{ html += p + " : " + game.scores[i] + "<br>"; });
      html += `<b>Trajanje: ${formatTime(game.duration)}</b>`;
      div.innerHTML = html;

      // Dugme za tabelu ako postoji
      if(game.tableHTML && game.tableHTML !== ""){
        let btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = "Tabela";
        btn.addEventListener("click", () => showArchivedTable(index));
        div.appendChild(document.createElement("br"));
        div.appendChild(btn);
      }

      gamesDiv.appendChild(div);
    });

    container.appendChild(gamesDiv);
  });
}

// Funkcija koja otvara tabelu za odabranu arhiviranu partiju
function showTableFromArchive(index) {
  let archive = JSON.parse(localStorage.getItem("remiArchive")) || [];
  let game = archive[index];
  if (!game || !game.roundHistory) return;

  showPage(4); // otvori tabelu
  let table = document.getElementById("roundTable");
  table.innerHTML = "";

  // Header tabele
  let header = "<tr>";
  game.players.forEach(p => header += "<th>" + p + "</th>");
  header += "<th class='timeCol'>Vrijeme</th></tr>";
  table.innerHTML += header;

  // Prikaz rundi
  let sums = new Array(game.players.length).fill(0);
  game.roundHistory.forEach((r, i) => {
    r.slice(0, game.players.length).forEach((v, j) => { sums[j] += v; });
    let roundTime = r[r.length - 1];
    let row = "<tr>";
    sums.forEach(v => row += "<td>" + v + "</td>");
    row += "<td class='timeCol'>" + formatTime(roundTime) + "</td></tr>";

    // Plava linija ciklusa
    if ((i + 1) % game.players.length === 0) {
      row = "<tr class='cycleLine'>" + row.replace(/<td class='timeCol'>.*<\/td>/, "<td class='timeCol'>" + formatTime(roundTime) + "</td>") + "</tr>";
    }

    table.innerHTML += row;
  });
}

function deleteSelected(){
  let archive=JSON.parse(localStorage.getItem("remiArchive"))||[];
  let checks=document.querySelectorAll("#archiveList input:checked"); let indexes=[];
  checks.forEach(c=>indexes.push(parseInt(c.value)));
  archive=archive.filter((g,i)=>!indexes.includes(i));
  localStorage.setItem("remiArchive",JSON.stringify(archive));
  loadArchive();
}

// Backup kompletne statistike
function exportFullStats() {
  const archive = JSON.parse(localStorage.getItem("remiArchive")) || [];
  const handStats = JSON.parse(localStorage.getItem("remiHandStats")) || {};

  if(archive.length === 0 && Object.keys(handStats).length === 0){
    alert("Nema podataka za backup statistike.");
    return;
  }

  let wins={}, totalPoints={}, gamesPlayed={};
  let maxGamePoints={player:"",val:-Infinity};
  let minGamePoints={player:"",val:Infinity};
  let maxTime={val:-1,date:""};
  let minTime={val:Infinity,date:""};

  archive.forEach(game=>{
    game.players.forEach((p,i)=>{
      if(!wins[p]) wins[p]=0;
      if(!totalPoints[p]) totalPoints[p]=0;
      if(!gamesPlayed[p]) gamesPlayed[p]=0;

      let score = game.scores[i];
      gamesPlayed[p]++;
      totalPoints[p]+=score;

      if(score > maxGamePoints.val){
        maxGamePoints.val = score;
        maxGamePoints.player = p;
      }

      if(score < minGamePoints.val){
        minGamePoints.val = score;
        minGamePoints.player = p;
      }
    });

    let minScore = Math.min(...game.scores);
    let winnerIndex = game.scores.indexOf(minScore);
    wins[game.players[winnerIndex]]++;

    if(game.duration > maxTime.val){
      maxTime.val = game.duration;
      maxTime.date = game.date;
    }

    if(game.duration < minTime.val){
      minTime.val = game.duration;
      minTime.date = game.date;
    }
  });

  const fullStats = { wins, totalPoints, gamesPlayed, handStats, maxGamePoints, minGamePoints, maxTime, minTime };

  const blob = new Blob([JSON.stringify(fullStats, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "remi_kompletna_statistika.json";
  a.click();
}

// Vraćanje kompletne statistike
function importFullStats() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";

  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);

        if(!confirm("Zamijeniti postojeću statistiku?")) return;

        localStorage.setItem("remiHandStats", JSON.stringify(data.handStats || {}));
        handStats = data.handStats || {};

        // Ostali podaci za JS (ako želiš prikazati)
        wins = data.wins || {};
        totalPoints = data.totalPoints || {};
        gamesPlayed = data.gamesPlayed || {};
        maxGamePoints = data.maxGamePoints || {player:"",val:-Infinity};
        minGamePoints = data.minGamePoints || {player:"",val:Infinity};
        maxTime = data.maxTime || {val:-1,date:""};
        minTime = data.minTime || {val:Infinity,date:""};

        displayHandStats();
        alert("Statistika uspješno vraćena.");
      } catch(err){
        alert("Greška pri učitavanju fajla.");
        console.error(err);
      }
    };

    reader.readAsText(file);
  };

  input.click();
}

function handleStatsImport(e){

  let file = e.target.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = function(event){

    try{

      let data = JSON.parse(event.target.result);

      if(typeof data !== "object"){
        alert("Neispravan fajl.");
        return;
      }

      if(!confirm("Zamijeniti postojeću statistiku?")) return;

      localStorage.setItem("remiHandStats", JSON.stringify(data));
      handStats = data;
      displayHandStats();

      alert("Statistika uspješno vraćena.");

    } catch(err){
      alert("Greška pri učitavanju fajla.");
    }

  };

  reader.readAsText(file);
}

// STATISTICS
function openStats(){

  // zapamti trenutno aktivnu stranicu
  const active = document.querySelector(".page.active");
  previousPage = parseInt(active.id.replace("page", ""));

  showPage(6);
  displayHandStats();

  let archive = JSON.parse(localStorage.getItem("remiArchive")) || [];

  let wins={}, totalPoints={}, gamesPlayed={};

  let maxGamePoints={player:"",val:-Infinity};
  let minGamePoints={player:"",val:Infinity};

  let maxTime={val:-1,date:""};
  let minTime={val:Infinity,date:""};

  archive.forEach(game=>{

    game.players.forEach((p,i)=>{

      if(!wins[p]) wins[p]=0;
      if(!totalPoints[p]) totalPoints[p]=0;
      if(!gamesPlayed[p]) gamesPlayed[p]=0;

      let score=game.scores[i];

      // ⭐ broj odigranih partija
      gamesPlayed[p]++;

      // ukupni poeni svih partija
      totalPoints[p]+=score;

      // rekord najvise poena u jednoj partiji
      if(score>maxGamePoints.val){
        maxGamePoints.val=score;
        maxGamePoints.player=p;
      }

      // rekord najmanje poena u jednoj partiji
      if(score<minGamePoints.val){
        minGamePoints.val=score;
        minGamePoints.player=p;
      }

    });

    // pobjednik (najmanje poena)
    let minScore=Math.min(...game.scores);
    let winnerIndex=game.scores.indexOf(minScore);
    wins[game.players[winnerIndex]]++;

    // trajanja
    if(game.duration>maxTime.val){
      maxTime.val=game.duration;
      maxTime.date=game.date;
    }

    if(game.duration<minTime.val){
      minTime.val=game.duration;
      minTime.date=game.date;
    }

  });

  let container=document.getElementById("statsList");
  container.innerHTML="";

  if(Object.keys(wins).length===0){
    container.innerHTML="Nema podataka.";
    return;
  }

  let bestPlayer = Object.keys(wins).reduce((a,b)=>wins[a]>wins[b]?a:b);

  container.innerHTML+=`<b>Igrac sa najvise pobjeda: ${wins[bestPlayer]}, ${bestPlayer}</b><br><br>`;

  // ⭐ POBJDE
  container.innerHTML+=`<b>Pobjede:</b><br>`;
  Object.keys(wins).forEach(p=>{
    container.innerHTML+=`${p}: ${wins[p]} pobjeda<br>`;
  });

  // ⭐ ODIGRANE PARTIJE
  container.innerHTML+=`<br><b>Odigrane partije:</b><br>`;
  Object.keys(gamesPlayed).forEach(p=>{
    container.innerHTML+=`${p}: ${gamesPlayed[p]} partija<br>`;
  });

  // ⭐ UKUPNI POENI
  container.innerHTML+=`<br><b>Ukupni poeni igraca:</b><br>`;
  Object.keys(totalPoints).forEach(p=>{
    container.innerHTML+=`${p}: ${totalPoints[p]} poena<br>`;
  });

  // ⭐ REKORDI
  container.innerHTML+=`<br><b>Najvise poena u jednoj partiji:</b> ${maxGamePoints.player}, ${maxGamePoints.val}<br>`;
  container.innerHTML+=`<b>Najmanje poena u jednoj partiji:</b> ${minGamePoints.player}, ${minGamePoints.val}<br>`;

  // ⭐ TRAJANJE
  container.innerHTML+=`<br><b>Najduza partija:</b> ${formatTime(maxTime.val)}, ${formatDate(maxTime.date)}<br>`;
  container.innerHTML+=`<b>Najkraca partija:</b> ${formatTime(minTime.val)}, ${formatDate(minTime.date)}<br>`;
}
