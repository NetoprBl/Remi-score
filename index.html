<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remi Score</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; color: #007AFF; margin:0; padding:0; }
  .dark { background: #1c1c1e; color: #0a84ff; }
  .center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
  .button { padding:10px 20px; border-radius:8px; border:1px solid #007AFF; background:#fff; color:#007AFF; margin:5px; cursor:pointer; }
  .button:hover { background:#e6f0ff; }
  table { border-collapse: collapse; margin-top:10px; }
  td, th { border:1px solid #ccc; padding:5px 10px; text-align:center; color:#007AFF; }
  .cycle-line { border-bottom:2px solid blue; }
  .time-col { color:red; border:none; width:60px; }
</style>
</head>
<body>
<div class="center" id="page1">
  <h2>Odaberi koliko igraca je u igri:</h2>
  <div id="playerButtons"></div>
</div>

<div class="center" id="page2" style="display:none;">
  <div id="playerNames"></div>
  <button class="button" id="startGameBtn">Kreni</button>
</div>

<div class="center" id="page3" style="display:none;">
  <div id="gameControls">
    <button class="button" id="newGameBtn">Nova igra</button>
    <button class="button" id="archiveBtn">Arhiva</button>
    <button class="button" id="statsBtn">Statistika</button>
  </div>
  <div id="gameTableContainer"></div>
</div>

<div id="archivePage" style="display:none;" class="center"></div>
<div id="statsPage" style="display:none;" class="center"></div>

<script>
// --- Global Variables ---
let numPlayers = 0;
let players = [];
let archive = JSON.parse(localStorage.getItem('remiArchive') || '[]');
let gameScores = [];
let startTimes = [];
let roundStartTime;

// --- Page 1: odabir broja igraca ---
const playerButtonsDiv = document.getElementById('playerButtons');
for(let i=2;i<=6;i++){
  let btn = document.createElement('button');
  btn.innerText = i;
  btn.className='button';
  btn.onclick=()=>{numPlayers=i; showPage2();}
  playerButtonsDiv.appendChild(btn);
}

function showPage2(){
  document.getElementById('page1').style.display='none';
  document.getElementById('page2').style.display='flex';
  const container = document.getElementById('playerNames');
  container.innerHTML='';
  players=[];
  for(let i=0;i<numPlayers;i++){
    let div=document.createElement('div');
    div.style.display='flex'; div.style.margin='5px';
    let lbl=document.createElement('label');
    lbl.innerText=`Igrac ${i+1}: `;
    lbl.style.width='80px';
    let input=document.createElement('input'); input.type='text';
    div.appendChild(lbl); div.appendChild(input);
    container.appendChild(div);
    players.push(input);
  }
}

document.getElementById('startGameBtn').onclick=()=>{
  players = players.map(i=>i.value || `Igrac${Math.floor(Math.random()*100)}`);
  gameScores=[]; startTimes=[]; showPage3();
};

// --- Page 3: Igra ---
function showPage3(){
  document.getElementById('page2').style.display='none';
  document.getElementById('page3').style.display='flex';
  renderGameTable();
  roundStartTime=Date.now();
}

function renderGameTable(){
  const container=document.getElementById('gameTableContainer');
  container.innerHTML='';
  let table=document.createElement('table');
  let header=table.insertRow();
  players.forEach(p=>{
    let th=document.createElement('th'); th.innerText=p;
    header.appendChild(th);
  });
  let thTime=document.createElement('th'); thTime.innerText='Vrijeme'; thTime.className='time-col';
  header.appendChild(thTime);
  container.appendChild(table);

  // unos bodova za rundu
  let inputRow=table.insertRow();
  players.forEach((p,i)=>{
    let td=inputRow.insertCell();
    let inp=document.createElement('input'); inp.type='number'; inp.value=0; inp.style.width='50px';
    td.appendChild(inp);
  });
  let tdTime=inputRow.insertCell(); tdTime.className='time-col'; tdTime.innerText='--';
  let submitBtn=document.createElement('button'); submitBtn.className='button'; submitBtn.innerText='Upis';
  submitBtn.onclick=()=>submitRound(table,inputRow);
  tdTime.appendChild(submitBtn);
  container.appendChild(table);
}

function submitRound(table,inputRow){
  let rowScores=[];
  const now=Date.now();
  let roundTime=new Date(now-roundStartTime);
  players.forEach((p,i)=>{
    let val = parseInt(inputRow.cells[i].children[0].value) || 0;
    rowScores.push(val);
  });
  let timeStr=roundTime.getUTCHours().toString().padStart(2,'0')+':'+roundTime.getUTCMinutes().toString().padStart(2,'0');
  inputRow.cells[players.length].innerText=timeStr;

  gameScores.push(rowScores);
  startTimes.push(now);

  // linija ciklusa svaki broj igraca rundi
  if(gameScores.length % numPlayers===0){
    let cycleRow=table.insertRow();
    for(let i=0;i<numPlayers;i++){
      let td=cycleRow.insertCell(); td.className='cycle-line'; td.innerHTML='&nbsp;';
    }
    let tdTime=cycleRow.insertCell(); tdTime.className='time-col';
  }

  // novi red za unos
  let newRow=table.insertRow();
  players.forEach((p,i)=>{
    let td=newRow.insertCell(); let inp=document.createElement('input'); inp.type='number'; inp.value=0; inp.style.width='50px'; td.appendChild(inp);
  });
  let tdTime=newRow.insertCell(); tdTime.className='time-col'; tdTime.innerText='--';
  let submitBtn=document.createElement('button'); submitBtn.className='button'; submitBtn.innerText='Upis';
  tdTime.appendChild(submitBtn);
  submitBtn.onclick=()=>submitRound(table,newRow);
}

// --- Dugmad ---
document.getElementById('newGameBtn').onclick=()=>{
  if(confirm('Da li želite prekinuti trenutnu igru?')){
    archive.push({players:players,scores:gameScores,startTimes:startTimes,date:new Date().toISOString()});
    localStorage.setItem('remiArchive',JSON.stringify(archive));
    location.reload();
  }
};

document.getElementById('archiveBtn').onclick=showArchive;
document.getElementById('statsBtn').onclick=openStats;

// --- Arhiva ---
function showArchive(){
  document.getElementById('page3').style.display='none';
  const container=document.getElementById('archivePage');
  container.style.display='flex';
  container.innerHTML='<h2>Arhiva partija</h2>';
  archive.forEach((g,i)=>{
    let div=document.createElement('div');
    div.innerHTML=`<b>Partija ${i+1}</b> (${g.date.slice(0,10)} ${g.date.slice(11,16)})<br>`;
    g.players.forEach((p,j)=>{
      div.innerHTML+=`${p}: ${g.scores.map(r=>r[j]).reduce((a,b)=>a+b,0)} poena<br>`;
    });
    container.appendChild(div);
  });
}

// --- Statistika ---
function openStats(){
  document.getElementById('page3').style.display='none';
  const container=document.getElementById('statsPage');
  container.style.display='flex';
  container.innerHTML='<h2>Statistika</h2>';

  // Pobjede
  let wins={};
  archive.forEach(game=>{
    let totals=game.scores[0].map((_,i)=>game.scores.map(r=>r[i]).reduce((a,b)=>a+b,0));
    let minTotal=Math.min(...totals);
    totals.forEach((t,i)=>{if(!wins[game.players[i]]) wins[game.players[i]]=0;});
    let winnerIndex=totals.indexOf(minTotal);
    wins[game.players[winnerIndex]]++;
  });
  let maxWinPlayer=Object.keys(wins).reduce((a,b)=>wins[a]>wins[b]?a:b);
  container.innerHTML+=`<b>Igrac sa najvise pobjeda: ${maxWinPlayer}, ${wins[maxWinPlayer]}</b><br>`;
  Object.keys(wins).forEach(p=>{
    container.innerHTML+=`${p}: ${wins[p]}<br>`;
  });

  // Najvise i najmanje poena u partiji
  let maxPointsPlayer=""; let maxPoints=-Infinity;
  let minPointsPlayer=""; let minPoints=Infinity;
  archive.forEach(game=>{
    game.players.forEach((p,i)=>{
      game.scores.forEach(row=>{
        let val=row[i];
        if(val>maxPoints){ maxPoints=val; maxPointsPlayer=p; }
        if(val<minPoints){ minPoints=val; minPointsPlayer=p; }
      });
    });
  });
  container.innerHTML+=`<b>Igrac sa najvise poena u partiji: ${maxPointsPlayer}, ${maxPoints}</b><br>`;
  container.innerHTML+=`<b>Igrac sa najmanje poena u partiji: ${minPointsPlayer}, ${minPoints}</b><br>`;

  // Najduza i najkraca partija
  if(archive.length>0){
    let maxTime=0, minTime=Infinity, maxDate="", minDate="";
    archive.forEach(game=>{
      let time=(game.startTimes[game.startTimes.length-1]-game.startTimes[0])/1000/60; // minute
      if(time>maxTime){ maxTime=time; maxDate=game.date; }
      if(time<minTime){ minTime=time; minDate=game.date; }
    });
    container.innerHTML+=`<b>Najduza partija:</b> ${Math.floor(maxTime/60).toString().padStart(2,'0')}:${Math.floor(maxTime%60).toString().padStart(2,'0')}, ${maxDate.slice(0,10)}<br>`;
    container.innerHTML+=`<b>Najkraca partija:</b> ${Math.floor(minTime/60).toString().padStart(2,'0')}:${Math.floor(minTime%60).toString().padStart(2,'0')}, ${minDate.slice(0,10)}<br>`;
  }
}

// --- PWA service worker ---
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
